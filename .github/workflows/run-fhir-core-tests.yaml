name: Run FHIR Core SQL on FHIR Tests

on:
  workflow_dispatch:
    inputs:
      fhir_core_branch:
        description: "Branch of hapifhir/org.hl7.fhir.core to test"
        required: true
        default: "master"
  schedule:
    # Run weekly on Sunday at 00:00 UTC.
    - cron: "0 0 * * 0"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: releases-branch
  cancel-in-progress: false

jobs:
  run-tests:
    runs-on: ubuntu-latest
    name: Run FHIR Core tests and deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Checkout FHIR Core
      - name: Checkout FHIR Core
        uses: actions/checkout@v4
        with:
          repository: hapifhir/org.hl7.fhir.core
          ref: ${{ github.event.inputs.fhir_core_branch || 'master' }}
          path: fhir-core

      # Install Java
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 17
          cache: maven

      # Build the r5 module of FHIR Core (and its dependencies)
      - name: Build r5 module and dependencies
        working-directory: fhir-core
        run: mvn install -pl org.hl7.fhir.r5 -am -DskipTests

      # Run the SQL on FHIR compliance tests in FHIR Core, producing
      # sof-test-report.json
      - name: Run SQL on FHIR tests
        working-directory: fhir-core
        run: mvn surefire:test@sof-compliance-test -pl org.hl7.fhir.r5

      # Checkout the content from the `releases` branch
      - name: Checkout releases branch
        uses: actions/checkout@v4
        with:
          ref: releases
          path: base_content

      # Checkout the current branch (to get the latest IG and test report sources)
      - name: Checkout current branch
        uses: actions/checkout@v4
        with:
          path: current_branch

      # Install Ruby for Jekyll
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.0"

      - run: |
          export GEM_HOME="$HOME/gems"
          export PATH="$HOME/gems/bin:$PATH"
          gem install jekyll bundler

      # Set up Bun for JavaScript dependencies
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      # Set up Node.js
      - uses: actions/setup-node@v4
        with:
          node-version: 18

      # Build test report viewer site
      - name: Build test report
        working-directory: current_branch/test_report
        run: |
          bun install
          bun run prepare
          bun run build

      # Copy the test report viewer site to base_content/extra, then drop the
      # FHIR Core test results JSON in alongside it so the viewer can fetch it
      - name: Assemble extra content
        run: |
          mkdir -p base_content/extra
          cp -R current_branch/test_report/public/* base_content/extra/
          cp fhir-core/org.hl7.fhir.r5/target/sof-test-report.json base_content/extra/hl7-fhir-core-test-results.json

      # Build IG and copy output to base_content/ig/latest
      - name: Build IG
        working-directory: current_branch
        run: |
          export GEM_HOME="$HOME/gems"
          export PATH="$HOME/gems/bin:$HOME/.bun/bin:$PATH"
          bun i -g fsh-sushi
          ./scripts/_updatePublisher.sh -y
          ./scripts/_genonce.sh

      - run: |
          mkdir -p base_content/ig/latest
          cp -R current_branch/output/* base_content/ig/latest/

      # Save current_branch/output/qa.html as a build artifact
      - uses: actions/upload-artifact@v4
        with:
          name: qa.html
          path: current_branch/output/qa.html

      # Persist the FHIR Core test results to the releases branch so future
      # main.yaml deployments continue to include them
      - name: Commit and push report to releases branch
        working-directory: base_content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add extra/hl7-fhir-core-test-results.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update HL7 FHIR Core SQL on FHIR test results"
            git push origin releases
          fi

      # Set up Pages for deployment
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # Upload the artifact (base_content) for deployment
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "base_content"

      # Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
